<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 50px; }
  .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1a56db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .error { color: #c53030; display: none; }
</style>
</head>
<body>
  <h1>Generating your credential...</h1>
  <div class="spinner"></div>
  <div class="error" id="errorMsg">Something went wrong. Please contact support.</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rid = params.get('rid');
    const country = params.get('country') || '';
    const lottery = params.get('lottery') || 'no';

    if (!rid) {
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = 'Missing rid parameter. Please complete the survey first.';
      return;
    }

    const API_URL = 'https://survey-counter.longhc23gemini.workers.dev/generate-draw-code';

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rid: rid })
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = data.error;
        return;
      }
      // 重定向到 credential.html，使用 draw_code 替代 rid
      const credentialUrl = 'https://longhc23gemini-creator.github.io/survey-credential/credential.html?code=' + encodeURIComponent(data.draw_code) + '&country=' + encodeURIComponent(country) + '&lottery=' + encodeURIComponent(lottery);
      window.location.href = credentialUrl;
    })
    .catch(err => {
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = 'Network error. Please try again.';
      console.error(err);
    });
  </script>
</body>
</html>
