<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 50px; background: #f7fafc; }
  .container { max-width: 400px; margin: 0 auto; }
  .spinner {
    border: 4px solid #e2e8f0;
    border-top: 4px solid #1a56db;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    animation: spin 0.8s linear infinite;
    margin: 30px auto;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  h1 { font-size: 20px; font-weight: 600; color: #2d3748; margin-bottom: 8px; }
  p { font-size: 14px; color: #718096; margin: 0; }
  .error { color: #c53030; display: none; margin-top: 20px; }
</style>
</head>
<body>
  <div class="container">
    <h1>Generating your credential...</h1>
    <p>Please wait while we prepare your participation record.</p>
    <div class="spinner"></div>
    <div class="error" id="errorMsg">Something went wrong. Please try again or contact support.</div>
  </div>

  <script>
    (function() {
      var errorEl = document.getElementById('errorMsg');

      function showError(msg) {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
      }

      async function process() {
        try {
          var params = new URLSearchParams(window.location.search);
          var rid = params.get('rid');
          var country = params.get('country') || '';
          var lottery = params.get('lottery') || 'no';

          if (!rid) {
            showError('Invalid link. Please complete the survey first.');
            return;
          }

          var genRes = await fetch('https://survey-counter.longhc23gemini.workers.dev/generate-draw-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rid: rid })
          });
          var genData = await genRes.json();

          if (genData.error) {
            showError(genData.error);
            return;
          }

          var credentialUrl = 'https://longhc23gemini-creator.github.io/survey-credential/credential.html?code=' + encodeURIComponent(genData.draw_code) + '&country=' + encodeURIComponent(country) + '&lottery=' + encodeURIComponent(lottery);
          window.location.href = credentialUrl;

        } catch (err) {
          showError('Network error. Please try again.');
          console.error(err);
        }
      }

      process();
    })();
  </script>
</body>
</html>
