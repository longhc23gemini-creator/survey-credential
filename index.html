  // 更安全：将 t.subtitle 中的第一段（直到第一个 <br><br>）作为 info，但这样做复杂。

  // 但我们有 t.returnBox 字段，所以可以直接使用。

  document.getElementById("proceedBtnAText").textContent = t.proceedBtn;

  // 额外，如果 panelA 显示，我们可能还需要在 congratsDesc 中显示国家名，已处理。

    // 抽奖国家
    document.getElementById("panelA").classList.add("visible");
    // 确保 lotteryDetail 初始隐藏
    document.getElementById("lotteryDetail").classList.remove("visible");
    document.getElementById("proceedBtnA").disabled = true;
  } else {
    // 非抽奖国家
    document.getElementById("panelB").classList.add("visible");
    document.getElementById("proceedBtnB").disabled = true;
  }
}

function selectLotteryChoice(choice) {
  lotteryChoice = choice;
  // Highlight selected
  document.querySelectorAll("#lotteryChoiceGroup .radio-option").forEach(el => el.classList.remove("selected"));
  if (event && event.currentTarget) event.currentTarget.classList.add("selected");

  if (choice === "quit") {
    document.getElementById("panelA").classList.remove("visible");
    document.getElementById("lotteryDetail").classList.remove("visible");
    document.getElementById("panelQuit").classList.add("visible");
    return;
  }

  if (choice === "yes") {
    document.getElementById("lotteryDetail").classList.add("visible");
  } else {
    document.getElementById("lotteryDetail").classList.remove("visible");
  }

  document.getElementById("proceedBtnA").disabled = false;
}

function selectNonLotteryChoice(choice) {
  nonLotteryChoice = choice;
  document.querySelectorAll("#nonLotteryChoiceGroup .radio-option").forEach(el => el.classList.remove("selected"));
  if (event && event.currentTarget) event.currentTarget.classList.add("selected");

  if (choice === "quit") {
    document.getElementById("panelB").classList.remove("visible");
    document.getElementById("panelQuit").classList.add("visible");
    return;
  }

  document.getElementById("proceedBtnB").disabled = false;
}

function proceedToSurvey() {
  let surveyKey = "INT";
  if (LOTTERY_COUNTRIES[selectedCountryCode]) {
    surveyKey = selectedCountryCode;
  }

  const lottery = (lotteryChoice === "yes") ? "yes" : "no";
  const baseUrl = SURVEY_URLS[surveyKey];
  const params = new URLSearchParams({
    profession: selectedProfession,
    country: selectedCountryCode,
    lottery: lottery
  });

  window.location.href = baseUrl + "?" + params.toString();
}
</script>
