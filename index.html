<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Governance & Trust Survey — NCCL Tsinghua University</title>
<style>
  :root {
    --blue: #1a56db;
    --blue-light: #ebf5ff;
    --blue-dark: #1e429f;
    --green: #276749;
    --green-bg: #f0fff4;
    --amber: #b7791f;
    --amber-bg: #fefcbf;
    --red: #c53030;
    --gray-50: #f7fafc;
    --gray-100: #f0f4f8;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e0;
    --gray-400: #a0aec0;
    --gray-500: #718096;
    --gray-600: #4a5568;
    --gray-700: #2d3748;
    --gray-900: #1a202c;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #f0f4f8 0%, #e8edf2 100%);
    color: var(--gray-900);
    line-height: 1.65;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    max-width: 720px;
    margin: 24px auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    padding: 44px 40px;
  }
  @media (max-width: 700px) {
    .container { padding: 28px 20px; margin: 12px auto; }
  }

  /* Header & Hero */
  .institution { text-align: center; margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--gray-200); }
  .institution-name { font-size: 13px; color: var(--gray-500); letter-spacing: 0.5px; text-transform: uppercase; }
  .hero { text-align: left; margin-bottom: 32px; background: var(--gray-50); padding: 26px; border-radius: var(--radius); border: 1px solid var(--gray-200); }
  .hero h1 { font-size: 22px; font-weight: 700; color: var(--gray-900); line-height: 1.35; margin-bottom: 16px; text-align: center; }
  .hero .sub { font-size: 14.5px; color: var(--gray-700); margin: 0 auto; line-height: 1.7; }
  
  .return-box { margin-top: 18px; padding: 18px; background: #fff; border-radius: 8px; border-left: 4px solid var(--blue); }

  h2 { font-size: 15px; font-weight: 700; color: var(--gray-700); margin: 28px 0 14px; display: flex; align-items: center; gap: 8px; }
  h2 .icon { font-size: 18px; }

  /* Country Cards */
  .country-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 14px 0 8px; }
  @media (max-width: 500px) { .country-grid { grid-template-columns: 1fr; } }
  .country-card { border: 2px solid var(--gray-200); border-radius: var(--radius); padding: 24px 14px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fff; display: flex; flex-direction: column; justify-content: center; min-height: 90px;}
  .country-card:hover { border-color: var(--blue); background: var(--blue-light); }
  .country-card.selected { border-color: var(--blue); background: var(--blue-light); box-shadow: 0 0 0 3px rgba(26,86,219,0.12); }
  .country-card .name { font-size: 15px; font-weight: 600; color: var(--gray-700); }
  .country-card .name-sub { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

  /* Opt-in Buttons */
  .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
  .opt-btn { padding: 14px; border: 2px solid var(--blue); border-radius: 8px; background: #fff; color: var(--blue); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .opt-btn:hover { background: var(--blue-light); }
  .opt-btn.active { background: var(--blue); color: #fff; box-shadow: 0 4px 10px rgba(26,86,219,0.2); }

  /* Progress & Prize */
  .progress-box { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .progress-label { font-size: 14px; color: var(--gray-600); margin-bottom: 10px; }
  .progress-bar-bg { height: 28px; background: var(--gray-200); border-radius: 14px; overflow: hidden; position: relative; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, var(--blue)); border-radius: 14px; transition: width 0.8s ease; min-width: 0; }
  .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: 700; color: var(--gray-700); white-space: nowrap; }
  .progress-phase { margin-top: 12px; font-size: 14px; color: var(--gray-700); text-align: center; background: #fff; padding: 10px; border-radius: 8px; border: 1px dashed var(--blue); }
  .progress-phase strong { color: var(--red); font-size: 16px; font-weight: 800; }

  .prize-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; margin: 14px 0; font-size: 14px; }
  .prize-table th { background: var(--blue); color: #fff; padding: 10px 14px; text-align: left; font-weight: 600; font-size: 13px; }
  .prize-table td { padding: 10px 14px; border-bottom: 1px solid var(--gray-200); }
  .prize-table tr:last-child td { border-bottom: none; }
  .prize-table tr:nth-child(even) td { background: var(--gray-50); }
  .prize-table .total-row td { font-weight: 700; background: var(--blue-light); border-top: 2px solid var(--blue); }

  .rules-list { font-size: 14px; color: var(--gray-600); padding-left: 20px; margin: 10px 0; }
  .rules-list li { margin-bottom: 12px; line-height: 1.6; }

  .hint-box { background: var(--blue-light); border-left: 4px solid var(--blue); border-radius: 0 var(--radius) var(--radius) 0; padding: 14px 18px; font-size: 14px; margin: 16px 0; line-height: 1.6; }

  /* CTA */
  .cta-section { text-align: center; margin-top: 28px; }
  .cta-btn { display: inline-block; background: var(--blue); color: #fff; border: none; padding: 14px 36px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; text-decoration: none; transition: background 0.15s, transform 0.1s; }
  .cta-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
  .cta-note { font-size: 12px; color: var(--gray-500); margin-top: 10px; }

  .footer { text-align: center; margin-top: 32px; padding-top: 18px; border-top: 1px solid var(--gray-200); font-size: 12px; color: var(--gray-400); line-height: 1.6; }
</style>
</head>

<div class="container">

  <div class="footer">
    New Construction Cross-Laboratory (NCCL), Tsinghua University<br>
    nccl@tsinghua.edu.cn
  </div>
</div>

function getLang() { 
  if (selectedCountry === "DE") return "de";
  if (selectedCountry === "SG") return "sg";
  return "en"; 
}

function applyLanguage() {
  var t = T[getLang()];
  document.getElementById("t-title").innerHTML = t.title;
  document.getElementById("t-subtitle").innerHTML = t.subtitle;
  document.getElementById("t-step1").innerHTML = t.step1;
  document.getElementById("t-step1-desc").innerHTML = t.step1Desc;
  document.getElementById("t-opt-heading").innerHTML = t.optHeading;
  document.getElementById("t-opt-desc").innerHTML = t.optDesc;
  document.getElementById("t-opt-yes").innerHTML = t.optYes;
  document.getElementById("t-opt-no").innerHTML = t.optNo;
  document.getElementById("t-progress-heading").innerHTML = t.progressHeading;
  document.getElementById("t-prize-heading").innerHTML = t.prizeHeading;
  document.getElementById("t-prize-intro").innerHTML = t.prizeIntro;
  document.getElementById("t-th-tier").innerHTML = t.thTier;
  document.getElementById("t-th-amount").innerHTML = t.thAmount;
  document.getElementById("t-th-winners").innerHTML = t.thWinners;
  document.getElementById("t-p1-name").innerHTML = t.p1;
  document.getElementById("t-p2-name").innerHTML = t.p2;
  document.getElementById("t-p3-name").innerHTML = t.p3;
  document.getElementById("t-p4-name").innerHTML = t.p4;
  document.getElementById("t-p5-name").innerHTML = t.p5;
  document.getElementById("t-p-total").innerHTML = t.pTotal;
  document.getElementById("t-p-total-win").innerHTML = t.pTotalWin;
  document.getElementById("t-rules-heading").innerHTML = t.rulesHeading;
  
  var ol = document.getElementById("rulesList");
  ol.innerHTML = "";
  t.rules.forEach(function(r) { var li = document.createElement("li"); li.innerHTML = r; ol.appendChild(li); });
  
  document.getElementById("t-hint").innerHTML = t.hint;
  document.getElementById("t-cta").innerHTML = t.cta;
  document.getElementById("t-cta-note").innerHTML = t.ctaNote;
  document.getElementById("t-int-info").innerHTML = t.intInfo;
}

function selectCountry(code) {
  selectedCountry = code;
  document.querySelectorAll(".country-card").forEach(function(el) { el.classList.remove("selected"); });
  document.getElementById("card-" + code).classList.add("selected");
  applyLanguage();

  if (code === "INT") {
    document.getElementById("optInSection").style.display = "none";
    document.getElementById("lotteryDetails").style.display = "none";
    document.getElementById("intSection").style.display = "block";
    document.getElementById("ctaContainer").style.display = "block";
    document.getElementById("ctaBtn").href = SURVEY_URLS[code];
  } else {
    document.getElementById("intSection").style.display = "none";
    document.getElementById("optInSection").style.display = "block";
    document.getElementById("lotteryDetails").style.display = "none";
    document.getElementById("ctaContainer").style.display = "none";
    document.getElementById("btnOptYes").classList.remove("active");
    document.getElementById("btnOptNo").classList.remove("active");
  }
}

function handleOptIn(wantsLottery) {
  document.getElementById("btnOptYes").classList.toggle("active", wantsLottery);
  document.getElementById("btnOptNo").classList.toggle("active", !wantsLottery);
  
  document.getElementById("ctaContainer").style.display = "block";
  
  var baseUrl = SURVEY_URLS[selectedCountry];
  var lotteryParam = wantsLottery ? "?lottery=yes" : "?lottery=no";
  document.getElementById("ctaBtn").href = baseUrl + lotteryParam;

  if (wantsLottery) {
    document.getElementById("lotteryDetails").style.display = "block";
    loadCounter(selectedCountry);
  } else {
    document.getElementById("lotteryDetails").style.display = "none";
  }
}

function loadCounter(code) {
  document.getElementById("counterLoading").style.display = "block";
  document.getElementById("progressContent").style.display = "none";

  fetch(API_URL + "?action=read")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      counts = data.counts || data;
      renderProgress(code);
    })
    .catch(function() { renderProgress(code); });
}

function renderProgress(code) {
  var t = T[getLang()];
  var n = counts[code] || 0;
  var pct = Math.min(100, Math.round((n / TOTAL_TARGET) * 100));

  document.getElementById("counterLoading").style.display = "none";
  document.getElementById("progressContent").style.display = "block";
  document.getElementById("progressLabel").innerHTML = t.progressLabel(code, n);
  document.getElementById("progressText").innerHTML = n + " / " + TOTAL_TARGET + " (" + pct + "%)";
  document.getElementById("progressPhase").innerHTML = t.phaseText(n);
  setTimeout(function() { document.getElementById("progressFill").style.width = pct + "%"; }, 100);
}
