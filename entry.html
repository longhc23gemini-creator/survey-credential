<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<style>
  :root {
    --blue: #1a56db;
    --blue-light: #ebf5ff;
    --blue-dark: #1e429f;
    --green: #276749;
    --green-bg: #f0fff4;
    --amber: #b7791f;
    --amber-bg: #fefcbf;
    --red: #c53030;
    --gray-50: #f7fafc;
    --gray-100: #f0f4f8;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e0;
    --gray-400: #a0aec0;
    --gray-500: #718096;
    --gray-600: #4a5568;
    --gray-700: #2d3748;
    --gray-900: #1a202c;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: linear-gradient(135deg, #f0f4f8 0%, #e8edf2 100%);
    color: var(--gray-900);
    line-height: 1.65;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    max-width: 680px;
    margin: 24px auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    padding: 44px 40px;
  }
  @media (max-width: 700px) {
    .container { padding: 28px 20px; margin: 12px auto; }
  }

  /* Institution header */
  .institution {
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--gray-200);
  }
  .institution-name {
    font-size: 13px;
    color: var(--gray-500);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Hero */
  .hero { text-align: center; margin-bottom: 32px; }
  .hero h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .hero .sub {
    font-size: 14px;
    color: var(--gray-500);
    max-width: 520px;
    margin: 0 auto;
  }

  /* Section */
  h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-700);
    margin: 28px 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h2 .icon { font-size: 18px; }

  /* Country cards */
  .country-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 14px 0 8px;
  }
  @media (max-width: 500px) {
    .country-grid { grid-template-columns: 1fr; }
  }
  .country-card {
    border: 2px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fff;
  }
  .country-card:hover {
    border-color: var(--blue);
    background: var(--blue-light);
  }
  .country-card.selected {
    border-color: var(--blue);
    background: var(--blue-light);
    box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
  }
  .country-card .flag { font-size: 32px; margin-bottom: 6px; }
  .country-card .name { font-size: 14px; font-weight: 600; color: var(--gray-700); }
  .country-card .name-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

  /* Progress section */
  .progress-section {
    display: none;
    margin-top: 24px;
    animation: fadeIn 0.3s ease;
  }
  .progress-section.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .progress-box {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .progress-label {
    font-size: 14px;
    color: var(--gray-600);
    margin-bottom: 10px;
  }
  .progress-bar-bg {
    height: 28px;
    background: var(--gray-200);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, var(--blue));
    border-radius: 14px;
    transition: width 0.8s ease;
    min-width: 0;
  }
  .progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-700);
    white-space: nowrap;
  }
  .progress-phase {
    margin-top: 10px;
    font-size: 13px;
    color: var(--gray-500);
    text-align: center;
  }
  .progress-phase strong { color: var(--blue); }

  /* Prize table */
  .prize-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 14px 0;
    font-size: 14px;
  }
  .prize-table th {
    background: var(--blue);
    color: #fff;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
  }
  .prize-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--gray-200);
  }
  .prize-table tr:last-child td { border-bottom: none; }
  .prize-table tr:nth-child(even) td { background: var(--gray-50); }
  .prize-table .total-row td {
    font-weight: 700;
    background: var(--blue-light);
    border-top: 2px solid var(--blue);
  }

  /* Rules */
  .rules-list {
    font-size: 14px;
    color: var(--gray-600);
    padding-left: 20px;
    margin: 10px 0;
  }
  .rules-list li { margin-bottom: 8px; line-height: 1.6; }

  .hint-box {
    background: var(--blue-light);
    border-left: 4px solid var(--blue);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 14px 18px;
    font-size: 14px;
    margin: 16px 0;
    line-height: 1.6;
  }

  /* CTA */
  .cta-section { text-align: center; margin-top: 28px; }
  .cta-btn {
    display: inline-block;
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 14px 36px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }
  .cta-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
  .cta-btn:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }
  .cta-note {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 10px;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 32px;
    padding-top: 18px;
    border-top: 1px solid var(--gray-200);
    font-size: 12px;
    color: var(--gray-400);
    line-height: 1.6;
  }

  /* Loading */
  .counter-loading { color: var(--gray-400); font-size: 13px; text-align: center; padding: 16px; }
  .mini-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--gray-200); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

  document.getElementById("t-p2-name").textContent = t.p2;
  document.getElementById("t-p3-name").textContent = t.p3;
  document.getElementById("t-p4-name").textContent = t.p4;
  document.getElementById("t-p-total").textContent = t.pTotal;
  document.getElementById("t-rules-heading").textContent = t.rulesHeading;
  var ol = document.getElementById("rulesList");
  ol.innerHTML = "";
  t.rules.forEach(function(r) { var li = document.createElement("li"); li.textContent = r; ol.appendChild(li); });
  document.getElementById("t-hint").textContent = t.hint;
  document.getElementById("t-cta").textContent = t.cta;
  document.getElementById("t-cta-note").textContent = t.ctaNote;
  // INT section text
  document.getElementById("t-int-info").textContent = t.intInfo;
  document.getElementById("t-cta-int").textContent = t.ctaInt;
  document.getElementById("t-cta-note-int").textContent = t.ctaNoteInt;
}

function selectCountry(code) {
  selectedCountry = code;
  document.querySelectorAll(".country-card").forEach(function(el) { el.classList.remove("selected"); });
  document.getElementById("card-" + code).classList.add("selected");

  applyLanguage();

  var lotterySection = document.getElementById("progressSection");
  var intSection = document.getElementById("intSection");

  if (code === "INT") {
    lotterySection.classList.remove("visible");
    intSection.classList.add("visible");
    document.getElementById("ctaBtnInt").href = SURVEY_URLS[code];
  } else {
    intSection.classList.remove("visible");
    lotterySection.classList.add("visible");
    document.getElementById("ctaBtn").href = SURVEY_URLS[code];
    loadCounter(code);
  }
}

function loadCounter(code) {
  var loading = document.getElementById("counterLoading");
  var content = document.getElementById("progressContent");
  loading.style.display = "block";
  content.style.display = "none";

  fetch(API_URL + "?action=read")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      counts = data.counts || data;
      renderProgress(code);
    })
    .catch(function() {
      // If API unavailable, show 0
      renderProgress(code);
    });
}

function renderProgress(code) {
  var t = T[getLang()];
  var n = counts[code] || 0;
  var pct = Math.min(100, Math.round((n / TOTAL_TARGET) * 100));

  document.getElementById("counterLoading").style.display = "none";
  document.getElementById("progressContent").style.display = "block";

  document.getElementById("progressLabel").textContent = t.progressLabel(code, n);
  document.getElementById("progressText").textContent = n + " / " + TOTAL_TARGET + " (" + pct + "%)";
  document.getElementById("progressPhase").innerHTML = t.phaseText(n);

  // Animate fill
  setTimeout(function() {
    document.getElementById("progressFill").style.width = pct + "%";
  }, 100);
}

// ── Initialize with default EN text ──
applyLanguage = (function(orig) {
  return function() {
    if (!selectedCountry) {
      // Pre-selection: show EN defaults
      var t = T.en;
      document.getElementById("t-title").textContent = t.title;
      document.getElementById("t-subtitle").textContent = t.subtitle;
      document.getElementById("t-step1").textContent = t.step1;
      document.getElementById("t-step1-desc").textContent = t.step1Desc;
      return;
    }
    orig();
  };
})(applyLanguage);

(function() {
  var t = T.en;
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-subtitle").textContent = t.subtitle;
  document.getElementById("t-step1").textContent = t.step1;

})();
