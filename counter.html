<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Counter</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    text-align: center;
    color: #1a56db; /* 清华蓝主题色 */
    background: #ebf5ff; /* 浅蓝底色 */
    border-radius: 10px;
    margin: 0;
    padding: 15px;
    border: 1px solid #a0aec0;
    font-size: 14px;
    line-height: 1.5;
  }
  .count-box { 
    font-weight: bold; 
    margin-top: 10px; 
    color: #1a202c; 
    font-size: 16px;
  }
</style>
</head>
<body>
    <div id="counter">Loading real-time quota... / 正在加载实时名额...</div>
    <script>
        // 指向您的 Cloudflare 大脑
        const API_URL = "https://survey-counter.longhc23gemini.workers.dev/";
        
        fetch(API_URL + "?action=read")
        .then(res => res.json())
        .then(data => {
            const counts = data.counts || {};
            const usLeft = Math.max(0, 150 - (counts.US || 0));
            const deLeft = Math.max(0, 150 - (counts.DE || 0));
            const sgLeft = Math.max(0, 150 - (counts.SG || 0));

            document.getElementById("counter").innerHTML =
                "🏆 <b>Prize Draw Spots Remaining / 剩余抽奖名额:</b><br>" +
                "<div class='count-box'>" +
                "🇺🇸 United States: " + usLeft + " &nbsp;|&nbsp; " +
                "🇩🇪 Germany: " + deLeft + " &nbsp;|&nbsp; " +
                "🇸🇬 Singapore: " + sgLeft +
                "</div>";
        })
        .catch(err => {
            document.getElementById("counter").innerHTML = "Quota system initializing... / 额度系统初始化中...";
        });
    </script>
</body>
</html>
