<style>

    color: var(--gray-500);
    margin-bottom: 24px;
  }
  .message-box {
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius);
    padding: 20px;
    margin: 20px 0;
    font-size: 14px;
    color: var(--gray-700);
    line-height: 1.7;
  }
  .message-box p { margin-bottom: 12px; }
  .message-box p:last-child { margin-bottom: 0; }
  .report-box {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 18px;
    margin: 20px 0;
    font-size: 14px;
    line-height: 1.7;
  }
  .report-box a { color: var(--blue); word-break: break-all; }
  .report-box code {
    background: var(--gray-100);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 12px;
  }
  .actions {
    text-align: center;
    margin-top: 28px;
  }
  .actions a {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s;
  }
  .btn-primary {
    background: var(--blue);
    color: #fff;
  }
  .btn-primary:hover { background: #1e429f; }
  .btn-secondary {
    background: var(--gray-100);
    color: var(--gray-600);
    margin-left: 10px;
  }
  .btn-secondary:hover { background: var(--gray-200); }
  .footer {
    text-align: center;
    margin-top: 32px;
    padding-top: 18px;
